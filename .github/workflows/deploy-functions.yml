name: Deploy Agent Runtime to Azure Functions

on:
  push:
    branches:
      - main

    paths:
      - 'agent_runtime/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: agent_runtime
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Function App settings
        uses: azure/appservice-settings@v1
        with:
          app-name: mm-agent-runtime
          app-settings-json: |
            [
              { "name": "SERVICE_BUS_CONNECTION_STRING",         "value": "${{ secrets.SERVICE_BUS_CONNECTION_STRING }}",         "slotSetting": false },
              { "name": "DATABASE_URL",                          "value": "${{ secrets.DATABASE_URL }}",                          "slotSetting": false },
              { "name": "AZURE_OPENAI_ENDPOINT",                 "value": "${{ secrets.AZURE_OPENAI_ENDPOINT }}",                 "slotSetting": false },
              { "name": "AZURE_OPENAI_API_KEY",                  "value": "${{ secrets.AZURE_OPENAI_API_KEY }}",                  "slotSetting": false },
              { "name": "AZURE_OPENAI_DEPLOYMENT_NAME",          "value": "${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}",          "slotSetting": false },
              { "name": "AZURE_OPENAI_API_VERSION",              "value": "2025-01-01-preview",                                   "slotSetting": false },
              { "name": "APPLICATIONINSIGHTS_CONNECTION_STRING",  "value": "${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}",  "slotSetting": false }
            ]

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: mm-agent-runtime
          package: agent_runtime
          scm-do-build-during-deployment: true
          enable-oryx-build: true

